name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse commit and determine version bump
        id: bump
        run: |
          CURRENT_VERSION=$(( cat solution/.version 2>/dev/null || echo "0.0.0" ) | tr -d '[:space:]')
          COMMIT_MSG=$(git log -1 --pretty=%B)
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "commit_message=$FIRST_LINE" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          BUMP_TYPE="none"

          if echo "$FIRST_LINE" | grep -qE '^feat(\([^)]+\))?!:'; then
            BUMP_TYPE="major"
          elif echo "$COMMIT_MSG" | grep -qE '^BREAKING CHANGE:'; then
            BUMP_TYPE="major"
          elif echo "$FIRST_LINE" | grep -qE '^feat(\(|:)'; then
            BUMP_TYPE="minor"
          elif echo "$FIRST_LINE" | grep -qE '^(fix|docs|refactor|perf|chore|ci|style|test|build)(\(|:)'; then
            BUMP_TYPE="patch"
          fi

          if [ "$BUMP_TYPE" = "none" ]; then
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "No version bump needed for: $FIRST_LINE"
            exit 0
          fi

          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "bump=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT_VERSION -> $NEW_VERSION ($BUMP_TYPE)"

      - name: Update version and changelog
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          COMMIT_MSG="${{ steps.bump.outputs.commit_message }}"
          DATE=$(date +%Y-%m-%d)

          SECTION="Miscellaneous"
          case "$COMMIT_MSG" in
            feat*) SECTION="Features" ;;
            fix*) SECTION="Bug Fixes" ;;
            docs*) SECTION="Documentation" ;;
            refactor*) SECTION="Refactoring" ;;
            perf*) SECTION="Performance" ;;
            chore*) SECTION="Miscellaneous" ;;
            ci*) SECTION="CI/CD" ;;
            style*) SECTION="Style" ;;
            test*) SECTION="Testing" ;;
            build*) SECTION="Build" ;;
          esac

          CLEAN_MSG=$(echo "$COMMIT_MSG" | sed -E 's/^[a-z]+(!?\([^)]+\))?!?:\s*//')

          echo "$NEW_VERSION" > solution/.version

          CHANGELOG_URL="https://github.com/${{ github.repository }}/releases/tag/v${NEW_VERSION}"

          if [ -f solution/CHANGELOG.md ]; then
            tmp_changelog="$(mktemp)"
            {
              head -n 1 solution/CHANGELOG.md
              printf '\n'
              printf '## [%s](%s) (%s)\n\n' "$NEW_VERSION" "$CHANGELOG_URL" "$DATE"
              printf '### %s\n\n' "$SECTION"
              printf '* %s\n' "$CLEAN_MSG"
              tail -n +2 solution/CHANGELOG.md
            } > "$tmp_changelog"
            mv "$tmp_changelog" solution/CHANGELOG.md
          else
            {
              printf '# Changelog\n\n'
              printf '## [%s](%s) (%s)\n\n' "$NEW_VERSION" "$CHANGELOG_URL" "$DATE"
              printf '### %s\n\n' "$SECTION"
              printf '* %s\n' "$CLEAN_MSG"
            } > solution/CHANGELOG.md
          fi

      - name: Commit, tag, and release
        if: steps.bump.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          TAG="v${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add solution/.version solution/CHANGELOG.md
          git commit -m "chore(release): ${TAG}"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping."
          else
            git tag "$TAG"
          fi

          git push origin main --tags

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping."
          else
            COMMIT_MSG="${{ steps.bump.outputs.commit_message }}"
            CLEAN_MSG=$(echo "$COMMIT_MSG" | sed -E 's/^[a-z]+(!?\([^)]*\))?!?:\s*//')

            NOTES_FILE="$(mktemp)"
            {
              echo "## What's Changed"
              echo
              printf '* %s\n' "$CLEAN_MSG"
              echo
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ steps.bump.outputs.current_version }}...${TAG}"
            } > "$NOTES_FILE"

            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE"

            rm -f "$NOTES_FILE"
          fi
