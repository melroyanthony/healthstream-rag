name: Feature Request
description: Propose a new feature or enhancement
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What do you want to add or change?
      placeholder: A clear description of the feature.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Architecture Layer
      description: Which layer does this feature affect?
      options:
        - Data Ingestion (HealthKit / FHIR / EHR)
        - Embedding Pipeline
        - RAG Query Pipeline
        - PHI / HIPAA Security
        - Observability
        - Infrastructure / IaC
        - API / Frontend
        - Evaluation / Testing
    validations:
      required: true
  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes
      description: Any implementation details, references, or constraints.
