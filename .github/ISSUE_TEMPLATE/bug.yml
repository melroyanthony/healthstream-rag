name: Bug Report
description: Report a bug in HealthStream RAG
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the form below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start local dev with `docker compose up`
        2. Send query to `/api/v1/query`
        3. Error occurs
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Ingestion Pipeline
        - Query Pipeline (RAG)
        - Vector Store (S3 Vectors / ChromaDB)
        - Patient Isolation
        - PHI Redaction
        - Guardrails
        - API / Authentication
        - Infrastructure (Terraform / Docker)
        - Evaluation (RAGAS)
        - Other
    validations:
      required: true
  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Paste any error messages or logs.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Deployment context and versions.
      placeholder: |
        - Backend: local / AWS Lambda
        - Vector backend: chroma / s3vectors / opensearch
        - Python: 3.13
        - OS: macOS / Linux
