name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solution/backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check app/ tests/

      - name: Run unit tests
        env:
          VECTOR_BACKEND: chroma
          LLM_BACKEND: anthropic
          EMBEDDER_BACKEND: local
          MOCK_AUTH: "true"
          ANTHROPIC_API_KEY: ""
        run: uv run pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image (local target)
        run: |
          cd solution/backend
          docker build --target local -t healthstream-rag:test .

      - name: Verify Docker image
        run: |
          docker run --rm -d --name healthstream-test \
            -p 8000:8000 \
            -e VECTOR_BACKEND=chroma \
            -e LLM_BACKEND=anthropic \
            -e EMBEDDER_BACKEND=local \
            -e MOCK_AUTH=true \
            -e ANTHROPIC_API_KEY= \
            healthstream-rag:test

          # Wait for startup
          sleep 30

          # Health check
          curl -f http://localhost:8000/health || exit 1

          docker stop healthstream-test
