openapi: 3.1.0
info:
  title: HealthStream RAG API
  description: |
    HIPAA-compliant RAG chatbot API for querying personal health data.
    Supports hybrid retrieval (vector + BM25), reranking, and cited generation.
  version: 1.0.0
  contact:
    name: Melroy Anthony
    email: themelroyanthony@gmail.com

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.healthstream.example.com
    description: Production (API Gateway)

tags:
  - name: health
    description: Health check endpoints
  - name: query
    description: RAG query pipeline
  - name: collections
    description: Vector collection management
  - name: ingest
    description: Document ingestion

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      description: Returns service health with dependency status
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /api/v1/query:
    post:
      tags: [query]
      summary: Query health data
      description: |
        Accepts a natural language question and returns a cited answer
        using hybrid retrieval (vector + BM25) with reranking.
        Patient ID is extracted from JWT - cross-patient access is impossible.
      operationId: queryHealth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query answered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "503":
          description: Service temporarily unavailable (LLM/vector store down)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/collections:
    get:
      tags: [collections]
      summary: List vector collections
      operationId: listCollections
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of collections
          content:
            application/json:
              schema:
                type: object
                properties:
                  collections:
                    type: array
                    items:
                      $ref: "#/components/schemas/Collection"

    post:
      tags: [collections]
      summary: Create a vector collection
      operationId: createCollection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectionRequest"
      responses:
        "201":
          description: Collection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "409":
          description: Collection already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/collections/{collection_name}:
    delete:
      tags: [collections]
      summary: Delete a vector collection
      operationId: deleteCollection
      security:
        - bearerAuth: []
      parameters:
        - name: collection_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Collection deleted
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/ingest:
    post:
      tags: [ingest]
      summary: Ingest documents
      description: |
        Ingests documents into the RAG pipeline. Documents are parsed,
        PHI-redacted, chunked, embedded, and stored in the vector backend.
        Patient ID is extracted from JWT.
      operationId: ingestDocuments
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "200":
          description: Documents ingested successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"
        "400":
          description: Invalid documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito JWT with patient_id claim

  schemas:
    HealthStatus:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          example: healthy
        version:
          type: string
          example: "1.0.0"
        vector_backend:
          type: string
          enum: [chroma, s3vectors]
          example: chroma
        dependencies:
          type: object
          properties:
            vector_store:
              type: string
              enum: [ok, error]
            llm:
              type: string
              enum: [ok, error]
            embedder:
              type: string
              enum: [ok, error]

    QueryRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 2000
          description: Natural language health question
          example: "What was my average sleep score last week?"
        collection_name:
          type: string
          default: "default"
          description: Vector collection to query
        top_k:
          type: integer
          default: 5
          minimum: 1
          maximum: 20
          description: Number of context chunks to retrieve

    QueryResponse:
      type: object
      required: [answer, citations, disclaimer, metadata]
      properties:
        answer:
          type: string
          description: Generated answer grounded in retrieved context
          example: "Your average sleep score was 82 out of 100 last week."
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
          description: Source documents cited in the answer
        disclaimer:
          type: string
          description: Medical disclaimer (always present)
          example: "This information is from your health records. Always consult your care team."
        metadata:
          type: object
          properties:
            retrieval_count:
              type: integer
              description: Number of chunks retrieved before reranking
            model:
              type: string
              description: LLM model used for generation
            latency_ms:
              type: number
              description: Total pipeline latency in milliseconds

    Citation:
      type: object
      required: [source_id, source_type, text_snippet]
      properties:
        source_id:
          type: string
          description: Unique identifier for the source document
          example: "sleep_session_2026-03-21"
        source_type:
          type: string
          enum: [healthkit, fhir, ehr]
          description: Data source type
        text_snippet:
          type: string
          description: Relevant text excerpt from the source
        relevance_score:
          type: number
          format: float
          description: Reranker relevance score (0-1)

    Collection:
      type: object
      required: [name, vector_count]
      properties:
        name:
          type: string
          example: "default"
        vector_count:
          type: integer
          example: 1500
        dimension:
          type: integer
          example: 384
        created_at:
          type: string
          format: date-time

    CreateCollectionRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[a-z][a-z0-9_-]*$"
          example: "healthkit-data"
        dimension:
          type: integer
          default: 384
          description: Vector dimension (384 for MiniLM, 1024 for Titan V2)

    IngestRequest:
      type: object
      required: [documents]
      properties:
        documents:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/DocumentInput"
        collection_name:
          type: string
          default: "default"

    DocumentInput:
      type: object
      required: [text, source_type, source_id]
      properties:
        text:
          type: string
          minLength: 1
          description: Raw document text (will be PHI-redacted before embedding)
        source_type:
          type: string
          enum: [healthkit, fhir, ehr]
        source_id:
          type: string
          description: Unique source document identifier
        metadata:
          type: object
          additionalProperties: true
          description: Additional metadata to store with the document

    IngestResponse:
      type: object
      required: [ingested_count, collection_name]
      properties:
        ingested_count:
          type: integer
          description: Number of documents successfully ingested
        collection_name:
          type: string
        chunk_count:
          type: integer
          description: Total chunks created from documents

    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          example: "Authentication required"

    ValidationErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  type: string
              msg:
                type: string
              type:
                type: string
