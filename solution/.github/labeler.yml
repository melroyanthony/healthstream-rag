backend:
  - changed-files:
      - any-glob-to-any-file: 'solution/backend/**'

infrastructure:
  - changed-files:
      - any-glob-to-any-file:
          - 'solution/backend/infra/**'
          - 'solution/docker-compose.yml'
          - 'solution/backend/Dockerfile'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - 'solution/docs/**'
          - 'solution/README.md'
          - 'solution/CHANGELOG.md'
          - 'problem/**'

tests:
  - changed-files:
      - any-glob-to-any-file: 'solution/backend/tests/**'

security:
  - changed-files:
      - any-glob-to-any-file:
          - 'solution/backend/app/middleware/**'
          - 'solution/backend/app/guardrails/**'

internal:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - 'solution/.github/**'
          - '.version'
